---
- name: Create Materia data directory
  ansible.builtin.file:
    path: "~/.local/state/materia"
    state: directory
    mode: "0700"

- name: Check if age private key exists on remote
  ansible.builtin.stat:
    path: "~/.local/state/materia/age-key.txt"
  register: age_key_remote

- name: Deploy age private key for Materia
  when: not age_key_remote.stat.exists
  block:
    - name: Check if age key source exists on control machine
      ansible.builtin.stat:
        path: "{{ materia_age_key_src }}"
      delegate_to: localhost
      become: false
      register: age_key_local

    - name: Fail if age key is missing everywhere
      ansible.builtin.fail:
        msg: >-
          Age private key not found on the server or at
          '{{ materia_age_key_src }}' on the control machine.
          Place your age-key.txt there or override with
          --extra-vars "materia_age_key_src=/path/to/age-key.txt"
      when: not age_key_local.stat.exists

    - name: Copy age private key to remote server
      when: age_key_local.stat.exists
      ansible.builtin.copy:
        src: "{{ materia_age_key_src }}"
        dest: "~/.local/state/materia/age-key.txt"
        mode: "0600"

- name: Update age private key if local copy available
  when: age_key_remote.stat.exists
  block:
    - name: Check if age key source exists on control machine
      ansible.builtin.stat:
        path: "{{ materia_age_key_src }}"
      delegate_to: localhost
      become: false
      register: age_key_local_update

    - name: Sync age private key from local copy
      when: age_key_local_update.stat.exists
      ansible.builtin.copy:
        src: "{{ materia_age_key_src }}"
        dest: "~/.local/state/materia/age-key.txt"
        mode: "0600"

- name: Create local bin directory for Materia
  ansible.builtin.file:
    path: "~/.local/bin"
    state: directory
    mode: "0755"

- name: Create systemd user state directory for Materia
  ansible.builtin.file:
    path: "~/.local/state/systemd/user"
    state: directory
    mode: "0755"

- name: Enable SSH agent socket
  ansible.builtin.systemd:
    name: ssh-agent.socket
    enabled: true
    state: started
    scope: user

- name: Deploy SSH key loader service
  ansible.builtin.copy:
    src: "{{ tier1_dir }}/materia/ssh-add-keys.service"
    dest: "~/.config/systemd/user/ssh-add-keys.service"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Deploy Materia Quadlet
  ansible.builtin.copy:
    src: "{{ tier1_dir }}/materia/materia.container"
    dest: "~/.config/containers/systemd/materia.container"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Deploy Materia update timer
  ansible.builtin.copy:
    src: "{{ tier1_dir }}/materia/materia-update.timer"
    dest: "~/.config/systemd/user/materia-update.timer"
    mode: "0644"
  notify: Reload systemd user daemon

- name: Flush handlers to reload systemd
  ansible.builtin.meta: flush_handlers

- name: Enable SSH key loader service
  ansible.builtin.systemd:
    name: ssh-add-keys.service
    enabled: true
    state: started
    scope: user

- name: Enable Materia update timer
  ansible.builtin.systemd:
    name: materia-update.timer
    enabled: true
    state: started
    scope: user

- name: Run initial Materia update
  ansible.builtin.systemd:
    name: materia
    state: started
    scope: user
